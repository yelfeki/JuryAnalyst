function TimelineViz({ data, segments, duration, label, color = C.primary, height = 50, yMin, yMax }) {
  const min = yMin !== undefined ? yMin : Math.min(...data);
  const max = yMax !== undefined ? yMax : Math.max(...data);
  const range = max - min || 1;
  const gradId = `tf-${label.replace(/\s/g, '')}-${Math.random().toString(36).substr(2, 5)}`;
  return (
    <div>
      {label && <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', color: C.subtle, marginBottom: 6 }}>{label}</div>}
      <div style={{ position: 'relative', height }}>
        <svg width="100%" height={height} viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0 }}>
          <defs>
            <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.35" />
              <stop offset="100%" stopColor={color} stopOpacity="0" />
            </linearGradient>
          </defs>
          {segments.map((seg, i) => {
            const x1 = (seg.start / duration) * 100;
            const x2 = (seg.end / duration) * 100;
            return <rect key={seg.id} x={x1} y="0" width={x2 - x1} height="100" fill={i % 2 === 0 ? 'transparent' : 'rgba(0,0,0,0.015)'} />;
          })}
          <polygon points={`0,100 ${data.map((v, i) => `${(i / (data.length - 1)) * 100},${100 - ((v - min) / range) * 100}`).join(' ')} 100,100`} fill={`url(#${gradId})`} />
          <polyline points={data.map((v, i) => `${(i / (data.length - 1)) * 100},${100 - ((v - min) / range) * 100}`).join(' ')} fill="none" stroke={color} strokeWidth="1.5" vectorEffect="non-scaling-stroke" />
        </svg>
      </div>
      <div style={{ display: 'flex', marginTop: 4, fontFamily: 'Poppins, sans-serif', fontSize: 9, color: C.subtle }}>
        {segments.map(seg => {
          const w = ((seg.end - seg.start) / duration) * 100;
          return <div key={seg.id} style={{ width: `${w}%`, textAlign: 'center', overflow: 'hidden', whiteSpace: 'nowrap' }}>{seg.label.split(' ')[0]}</div>;
        })}
      </div>
    </div>
  );
}

function RingMeter({ value, max = 10, label, size = 72, color = C.primary }) {
  const r = size / 2 - 6;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - value / max);
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={C.light} strokeWidth="5" />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth="5" strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" transform={`rotate(-90 ${size / 2} ${size / 2})`} />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 18, color: C.text, lineHeight: 1 }}>{value}</div>
        {label && <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 8, textTransform: 'uppercase', letterSpacing: '0.06em', color: C.subtle, marginTop: 2, textAlign: 'center', maxWidth: 60 }}>{label}</div>}
      </div>
    </div>
  );
}

function Bar({ value, max = 10, color = C.primary, height = 5, label, labelRight }) {
  return (
    <div>
      {(label || labelRight) && (
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 3, fontFamily: 'Poppins, sans-serif', fontSize: 10.5, fontWeight: 500, color: C.text }}>
          <span>{label}</span>
          <span style={{ color: C.subtle }}>{labelRight}</span>
        </div>
      )}
      <div style={{ height, background: C.gray, borderRadius: height / 2, overflow: 'hidden' }}>
        <div style={{ width: `${Math.min(100, (value / max) * 100)}%`, height: '100%', background: color, borderRadius: height / 2 }} />
      </div>
    </div>
  );
}

function LanguageTab() {
  return (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(12, 1fr)', gap: 14 }}>
      <div style={{ gridColumn: 'span 12' }}>
        <Panel title="Powerful vs powerless speech (O'Barr / Law & Language Project)" subtitle="Four linguistic markers separate credible from tentative speech" iconKey="MessageSquare">
          <Insight tone="info">
            <strong>Research base.</strong> O'Barr's Law & Language Project (1978) and decades of replication show that four linguistic features — hedges, hesitations, intensifiers, tag questions — systematically reduce perceived credibility, competence, and persuasiveness. Speakers using powerful speech are rated as more believable, more trustworthy, and more intelligent for identical content.
          </Insight>
        </Panel>
      </div>

      {Object.entries(LINGUISTIC_POWER.markers).map(([k, v]) => {
        const color = v.severity === 'low' ? C.good : v.severity === 'medium' ? C.warn : C.bad;
        const label = k.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
        const descriptions = {
          hedges: 'Soften assertions ("sort of," "kind of"). Signal uncertainty about what you\'re saying.',
          hesitations: 'Fillers ("um," "uh"). Signal that you\'re unsure of the next thought.',
          intensifiers: 'Amplifiers ("very," "really," "so"). At high density, read as pleading or compensating.',
          tagQuestions: 'Trailing questions ("...isn\'t it?", "...right?"). Turn assertions into requests for agreement.',
        };
        return (
          <div key={k} style={{ gridColumn: 'span 6' }}>
            <Panel title={label} subtitle={descriptions[k]} iconKey="MessageSquare" accent={color}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 12 }}>
                <RingMeter value={v.count} max={50} label="Count" color={color} size={76} />
                <div>
                  <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 20, color }}>{v.ratePerMinute}<span style={{ fontSize: 13, color: C.subtle }}>/min</span></div>
                  <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, color: C.subtle, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Rate</div>
                  <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 700, color, textTransform: 'uppercase', letterSpacing: '0.06em', marginTop: 4 }}>{v.severity} concern</div>
                </div>
              </div>
              <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, color: C.subtle, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>Examples</div>

                <div key={i} style={{ padding: '4px 0', fontFamily: 'Noto Sans, sans-serif', fontSize: 12, color: C.text, fontStyle: 'italic' }}>{ex}</div>
              ))}
            </Panel>
          </div>
        );
      })}

      <div style={{ gridColumn: 'span 12' }}>
        <Panel title="Passive voice & structural issues" subtitle="Where your sentences remove the defendant from their own conduct" iconKey="AlertTriangle">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 14 }}>

            <div key={i} style={{ padding: 12, background: C.warnBg, borderLeft: `3px solid ${C.warn}`, borderRadius: 4, marginBottom: 8 }}>

function DeliveryTab() {

            <strong>Methodology note.</strong> Vocal dimensions (pacing, intonation, certainty prosody) have strong empirical grounding. Visual dimensions (gesture, proxemics, eye contact) have weaker research support — we report what's observable without claiming it reveals credibility or truthfulness. Meta-analytic research (Bond & DePaulo) shows nonverbal visual lie detection barely exceeds chance.
          </Insight>
        </Panel>
      </div>

      <div style={{ gridColumn: 'span 12' }}>
        <Panel title="Vocal dimensions (high-confidence measurements)" subtitle="Acoustic analysis of the audio track" iconKey="Mic">

            {['pacing', 'pauses', 'intonation', 'certaintyProsody'].map(k => {
              const d = DELIVERY[k];
              const label = k === 'certaintyProsody' ? 'Certainty prosody' : k.charAt(0).toUpperCase() + k.slice(1);
              const color = d.score >= 8 ? C.good : d.score >= 6 ? C.secondary : C.warn;
              return (
                <div key={k} style={{ padding: 14, background: C.gray, borderRadius: 8, textAlign: 'center' }}>
                  <RingMeter value={d.score} label={label} color={color} size={76} />

        </Panel>
      </div>

      <div style={{ gridColumn: 'span 12' }}>
        <Panel title="Visual dimensions (interpret with caution)" subtitle="Observable behaviors — not inferences about state" iconKey="Eye" accent={C.subtle}>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 12 }}>
            {['eyeContact', 'gesture', 'proxemics', 'articulation', 'verbalTics'].map(k => {
              const d = DELIVERY[k];

              const color = d.score >= 8 ? C.good : d.score >= 6 ? C.secondary : C.warn;
              return (

      <div style={{ gridColumn: 'span 7' }}>

              <line x1="0" y1="65" x2="600" y2="65" stroke={C.border} strokeDasharray="3,3" />
              {BEATS.map((b, i) => {
                const bTime = parseInt(b.time.split(':')[0]) * 60 + parseInt(b.time.split(':')[1]);

                    <text x={x} y={y < 65 ? y - 8 : y + 14} textAnchor="middle" fontFamily="Poppins, sans-serif" fontSize="8" fontWeight="600" fill={C.subtle}>{b.time}</text>

              })}

          {RHETORICAL.map((d, i) => {
            const color = d.quality === 'strong' ? C.good : d.quality === 'mixed' ? C.warn : C.bad;

      </div>

  );

      <div style={{ background: 'white', borderBottom: `1px solid ${C.border}`, padding: '12px 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', position: 'sticky', top: 0, zIndex: 50 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <svg width="30" height="30" viewBox="0 0 100 100"><polygon points="25,5 75,5 100,50 75,95 25,95 0,50" fill={C.primary} /><text x="50" y="62" textAnchor="middle" fill="white" fontFamily="Poppins, sans-serif" fontWeight="800" fontSize="34">JA</text></svg>
          <div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 13, color: C.primary, letterSpacing: '0.02em' }}>JURY ANALYST</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 9, color: C.subtle, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Closing Analysis</div>
          </div>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 600, fontSize: 12, color: C.text }}>{CASE.name}</div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 10, color: C.subtle }}>{CASE.type} · {CASE.jurisdiction}</div>
          </div>
          <div style={{ width: 32, height: 32, borderRadius: '50%', background: C.secondary, color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 12 }}>RC</div>
        </div>
      </div>

      {/* Hero */}
      <div style={{ background: `linear-gradient(135deg, ${C.primary} 0%, ${C.secondary} 100%)`, padding: '22px 24px', color: 'white', position: 'relative', overflow: 'hidden' }}>
        <div style={{ position: 'absolute', right: -40, top: -60, opacity: 0.06 }}>
          <svg width="280" height="280" viewBox="0 0 100 100"><polygon points="25,5 75,5 100,50 75,95 25,95 0,50" fill="white" /></svg>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1.8fr 1fr 1fr 1fr 1fr', gap: 24, alignItems: 'center', position: 'relative' }}>
          <div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.12em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 6 }}>The Headline</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 19, fontWeight: 700, lineHeight: 1.3 }}>Your theme lands. Your rebuttal doesn't. Your prosody undercuts your strongest claims.</div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 12.5, opacity: 0.85, marginTop: 6, lineHeight: 1.55 }}>Strong safety-rule framing buys 11 minutes of attention. Then the rebuttal goes silent. Three high-risk moments raise credibility and objection concerns. The fixes are specific and low-effort.</div>
          </div>
          <div style={{ borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 20 }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 4 }}>Overall</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 30, lineHeight: 1 }}>7.4<span style={{ fontSize: 14, opacity: 0.6 }}>/10</span></div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, opacity: 0.75, marginTop: 2 }}>top 32% in set</div>
          </div>
          <div style={{ borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 20 }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 4 }}>Story Model</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 30, lineHeight: 1 }}>7.3</div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, opacity: 0.75, marginTop: 2 }}>uniqueness weak</div>
          </div>
          <div style={{ borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 20 }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 4 }}>Objection Risk</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 30, lineHeight: 1 }}>2</div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, opacity: 0.75, marginTop: 2 }}>high-risk moments</div>
          </div>
          <div style={{ borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 20 }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 4 }}>#1 Fix</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 15, lineHeight: 1.25 }}>Rewrite Golden Rule at 11:22</div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, opacity: 0.75, marginTop: 2 }}>low effort, high impact</div>
          </div>
        </div>
      </div>

      {/* Tab bar */}
      <div style={{ background: 'white', borderBottom: `1px solid ${C.border}`, padding: '0 24px', display: 'flex', gap: 2, overflowX: 'auto', position: 'sticky', top: 62, zIndex: 40 }}>
        {views.map(v => {
          const active = activeView === v.id;
          return (
            <button key={v.id} onClick={() => setActiveView(v.id)} style={{ padding: '12px 14px', background: 'transparent', border: 'none', borderBottom: active ? `3px solid ${C.primary}` : '3px solid transparent', marginBottom: -1, cursor: 'pointer', fontFamily: 'Poppins, sans-serif', fontWeight: active ? 600 : 500, fontSize: 12, color: active ? C.primary : C.subtle, whiteSpace: 'nowrap', display: 'flex', alignItems: 'center', gap: 7 }}>
              <Icon path={icons[v.iconKey]} size={13} />
              {v.label}
            </button>
          );
        })}
      </div>

      {/* Content + sidebar */}
      <div style={{ padding: 20, display: 'grid', gridTemplateColumns: '1fr 340px', gap: 16 }}>
        <div>
          <TabContent active={activeView} />
        </div>

        {/* Right column: Video + meta */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div style={{ background: 'white', border: `1px solid ${C.border}`, borderRadius: 10, overflow: 'hidden', position: 'sticky', top: 116 }}>
            <div style={{ aspectRatio: '16/9', background: `linear-gradient(135deg, ${C.primary} 0%, ${C.secondary} 100%)`, position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(circle at 30% 40%, rgba(255,255,255,0.1) 0%, transparent 60%)' }} />
              <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'rgba(255,255,255,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', zIndex: 1 }} onClick={() => setIsPlaying(!isPlaying)}>
                <Icon path={isPlaying ? icons.Pause : icons.Play} size={26} color="white" />
              </div>
              <div style={{ position: 'absolute', bottom: 10, left: 12, color: 'white', fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.75 }}>Mock Closing · {fmt(CASE.duration)}</div>
            </div>
            <div style={{ padding: 10, background: C.dark }}>
              <div style={{ display: 'flex', height: 5, borderRadius: 3, overflow: 'hidden', marginBottom: 8 }}>
                {SEGMENTS.map(seg => {
                  const width = ((seg.end - seg.start) / CASE.duration) * 100;
                  const isActive = currentTime >= seg.start && currentTime < seg.end;
                  return <div key={seg.id} onClick={() => setCurrentTime(seg.start)} style={{ width: `${width}%`, background: seg.color, opacity: isActive ? 1 : 0.5, cursor: 'pointer' }} title={seg.label} />;
                })}
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: 'Poppins, sans-serif', fontSize: 10, color: 'white' }}>
                <span>{fmt(currentTime)}</span>
                <span style={{ opacity: 0.5 }}>{fmt(CASE.duration)}</span>
              </div>
            </div>
            <div style={{ padding: 14 }}>
              <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, color: C.subtle, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>Current Segment</div>
              <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 15, color: C.text }}>
                {SEGMENTS.find(s => currentTime >= s.start && currentTime < s.end)?.label || 'Opening Hook'}
              </div>
            </div>
          </div>

          <Panel title="Top 3 fixes" subtitle="Ranked by expected lift" iconKey="Lightbulb">
            {[
              { num: 1, title: 'Rewrite Golden Rule at 11:22', effort: 'Low', impact: 'High', note: 'Mistrial risk → zero. Single sentence.' },
              { num: 2, title: 'Triple rebuttal time on individual driver error', effort: 'Med', impact: 'High', note: '41s → 90s+. This is where verdicts get lost.' },
              { num: 3, title: 'Add per-diem for $8.4M non-economic', effort: 'Med', impact: 'Med', note: '$767/day over 30 years is concrete, defensible.' },
            ].map((fix, i) => (
              <div key={i} style={{ padding: '10px 0', borderBottom: i < 2 ? `1px solid ${C.border}` : 'none' }}>
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                  <div style={{ width: 22, height: 22, borderRadius: '50%', background: C.primary, color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 11, flexShrink: 0 }}>{fix.num}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 600, fontSize: 12.5, color: C.text, lineHeight: 1.35 }}>{fix.title}</div>
                    <div style={{ display: 'flex', gap: 10, marginTop: 4, fontFamily: 'Poppins, sans-serif', fontSize: 10, color: C.subtle }}>
                      <span>Effort: <strong style={{ color: C.text }}>{fix.effort}</strong></span>
                      <span>Impact: <strong style={{ color: fix.impact === 'High' ? C.good : C.warn }}>{fix.impact}</strong></span>
                    </div>
                    <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11.5, color: C.subtle, marginTop: 5, lineHeight: 1.5 }}>{fix.note}</div>
                  </div>
                </div>
              </div>
            ))}
          </Panel>

          <Panel title="Case context" iconKey="FileText">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, fontFamily: 'Noto Sans, sans-serif', fontSize: 12 }}>
              <div><span style={{ color: C.subtle }}>Attorney: </span><strong style={{ color: C.text }}>{CASE.attorney}</strong></div>
              <div><span style={{ color: C.subtle }}>Jurisdiction: </span><strong style={{ color: C.text }}>{CASE.jurisdiction}</strong></div>
              <div><span style={{ color: C.subtle }}>Words: </span><strong style={{ color: C.text }}>{CASE.wordCount.toLocaleString()}</strong> <span style={{ color: C.subtle, fontSize: 11 }}>· {CASE.avgWPM} WPM</span></div>
              <div><span style={{ color: C.subtle }}>Exhibits referenced: </span><strong style={{ color: C.text }}>14</strong></div>
              <div><span style={{ color: C.subtle }}>Depositions cited: </span><strong style={{ color: C.text }}>6</strong></div>
              <div><span style={{ color: C.subtle }}>Record coverage: </span><strong style={{ color: C.good }}>92%</strong></div>
            </div>
          </Panel>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Dashboard />);
</script>
</body>
</html>
