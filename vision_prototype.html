function TimelineViz({ data, segments, duration, label, color = C.primary, height = 50 }) {
  const gradId = `tf-${label.replace(/\s/g, '')}`;
  return (
    <div>
      {label && <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', color: C.subtle, marginBottom: 6 }}>{label}</div>}
      <div style={{ position: 'relative', height }}>
        <svg width="100%" height={height} viewBox="0 0 100 100" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0 }}>
          <defs>
            <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.35" />
              <stop offset="100%" stopColor={color} stopOpacity="0" />
            </linearGradient>
          </defs>
          {segments.map((seg, i) => {
            const x1 = (seg.start / duration) * 100;
            const x2 = (seg.end / duration) * 100;
            return <rect key={seg.id} x={x1} y="0" width={x2 - x1} height="100" fill={i % 2 === 0 ? 'transparent' : 'rgba(0,0,0,0.015)'} />;
          })}
          <polygon points={`0,100 ${data.map((v, i) => `${(i / (data.length - 1)) * 100},${100 - v}`).join(' ')} 100,100`} fill={`url(#${gradId})`} />
          <polyline points={data.map((v, i) => `${(i / (data.length - 1)) * 100},${100 - v}`).join(' ')} fill="none" stroke={color} strokeWidth="1.5" vectorEffect="non-scaling-stroke" />
        </svg>
      </div>
      <div style={{ display: 'flex', marginTop: 4, fontFamily: 'Poppins, sans-serif', fontSize: 9, color: C.subtle }}>
        {segments.map(seg => {
          const w = ((seg.end - seg.start) / duration) * 100;
          return <div key={seg.id} style={{ width: `${w}%`, textAlign: 'center', overflow: 'hidden', whiteSpace: 'nowrap' }}>{seg.label.split(' ')[0]}</div>;
        })}
      </div>
    </div>
  );
}

function RingMeter({ value, max = 10, label, size = 72, color = C.primary }) {
  const r = size / 2 - 6;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - value / max);
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size}>
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={C.light} strokeWidth="5" />
        <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color} strokeWidth="5" strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round" transform={`rotate(-90 ${size / 2} ${size / 2})`} />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 18, color: C.text, lineHeight: 1 }}>{value}</div>
        {label && <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 8, textTransform: 'uppercase', letterSpacing: '0.06em', color: C.subtle, marginTop: 2, textAlign: 'center', maxWidth: 60 }}>{label}</div>}
      </div>
    </div>
  );
}

          <div style={{ borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 20 }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 4 }}>Overall</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 30, lineHeight: 1 }}>7.4<span style={{ fontSize: 14, opacity: 0.6 }}>/10</span></div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, opacity: 0.75, marginTop: 2 }}>top 32% in our set</div>
          </div>
          <div style={{ borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 20 }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 4 }}>Objection Risks</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 30, lineHeight: 1 }}>3</div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, opacity: 0.75, marginTop: 2 }}>1 high · 2 medium</div>
          </div>
          <div style={{ borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 20 }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 4 }}>Silent Stretch</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 30, lineHeight: 1 }}>4:15</div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, opacity: 0.75, marginTop: 2 }}>7:30–11:45</div>
          </div>
          <div style={{ borderLeft: '1px solid rgba(255,255,255,0.2)', paddingLeft: 20 }}>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.7, marginBottom: 4 }}>Biggest Win</div>
            <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 15, lineHeight: 1.25 }}>"Chose profit over safety"</div>
            <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, opacity: 0.75, marginTop: 2 }}>11 reinforcements</div>
          </div>
        </div>
      </div>

      <div style={{ padding: 20, display: 'grid', gridTemplateColumns: '1fr 360px', gap: 16 }}>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(12, 1fr)', gap: 14 }}>

          <div style={{ gridColumn: 'span 12' }}>
            <Panel title="Closing on a single timeline" subtitle="Every measurement, synchronized. Click to jump to a moment." iconKey="Activity">
              <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                <TimelineViz data={THEME_TIMELINE} segments={SEGMENTS} duration={CASE.duration} label="Theme strength" color={C.primary} />
                <TimelineViz data={ATTENTION_TIMELINE} segments={SEGMENTS} duration={CASE.duration} label="Predicted jury attention" color={C.secondary} />
                <TimelineViz data={VALENCE_TIMELINE} segments={SEGMENTS} duration={CASE.duration} label="Emotional valence" color={C.purple} />
              </div>
              <div style={{ marginTop: 14 }}>
                <Insight tone="warn">
                  <strong>What to see here.</strong> Your theme and jury attention climb together through minute 7, then both collapse during the rebuttal. The emotional valence goes flat at exactly the moment the jury should be leaning in. These lines should rise and fall together — right now they diverge where it matters most.
                </Insight>
              </div>
            </Panel>
          </div>

          <div style={{ gridColumn: 'span 8' }}>
            <Panel title="Is your theme landing?" subtitle="Where your central message shows up — and where it goes missing" iconKey="Flag">
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, marginBottom: 14 }}>
                <div style={{ padding: 12, background: C.gray, borderRadius: 6 }}>
                  <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', color: C.subtle, marginBottom: 6 }}>Your Theme</div>
                  <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 600, fontSize: 15, color: C.text, fontStyle: 'italic' }}>"{THEME_TRACKING.primary}"</div>
                  <div style={{ display: 'flex', gap: 18, marginTop: 12 }}>
                    <div><span style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 18, color: C.primary }}>{THEME_TRACKING.stated}</span><span style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, color: C.subtle, marginLeft: 5 }}>stated</span></div>
                    <div><span style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 18, color: C.primary }}>{THEME_TRACKING.reinforced}</span><span style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, color: C.subtle, marginLeft: 5 }}>reinforced</span></div>
                  </div>
                </div>
                <div style={{ padding: 12, background: C.gray, borderRadius: 6 }}>
                  <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', color: C.subtle, marginBottom: 8 }}>By segment</div>
                  {THEME_BY_SEG.map(seg => (
                    <div key={seg.id} style={{ marginBottom: 6 }}>
                      <Bar value={seg.strength} max={100} color={seg.color} label={seg.label} labelRight={`${seg.strength}%`} />
                    </div>
                  ))}
                </div>
              </div>
              <Insight tone="warn">
                <strong>Silent stretch: {THEME_TRACKING.silent.start}–{THEME_TRACKING.silent.end}.</strong> {THEME_TRACKING.silent.note}
              </Insight>
            </Panel>
          </div>

          <div style={{ gridColumn: 'span 4' }}>
            <Panel title="Where does the jury lose you?" subtitle="Predicted friction points" iconKey="MousePointer2">
              <div style={{ maxHeight: 320, overflowY: 'auto' }}>
                {FRICTION.map((fp, i) => (
                  <div key={i} style={{ padding: '10px 0', borderBottom: i < FRICTION.length - 1 ? `1px solid ${C.border}` : 'none' }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                      <span style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 11, color: fp.severity === 'high' ? C.bad : C.warn }}>{fp.time}</span>
                      <span style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, color: C.subtle, textTransform: 'uppercase', letterSpacing: '0.05em' }}>{fp.type}</span>
                    </div>
                    <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 12, color: C.text, lineHeight: 1.45, marginBottom: 4 }}>{fp.text}</div>
                    <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11.5, color: C.subtle, lineHeight: 1.45, fontStyle: 'italic' }}>→ {fp.fix}</div>
                  </div>
                ))}
              </div>
            </Panel>
          </div>

          <div style={{ gridColumn: 'span 7' }}>
            <Panel title="Does each claim rest on evidence?" subtitle="Every claim in your closing traced to the record" iconKey="GitBranch">
              {ARGUMENTS.map((arg, i) => {
                const isExpanded = expandedArg === i;
                const statusColor = arg.strength === 'strong' ? C.good : arg.strength === 'medium' ? C.warn : C.bad;
                return (
                  <div key={i} style={{ borderBottom: i < ARGUMENTS.length - 1 ? `1px solid ${C.border}` : 'none' }}>
                    <div onClick={() => setExpandedArg(isExpanded ? -1 : i)} style={{ padding: '10px 0', cursor: 'pointer', display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                      <div style={{ width: 8, height: 8, borderRadius: '50%', background: statusColor, marginTop: 6, flexShrink: 0 }} />
                      <div style={{ flex: 1 }}>
                        <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 12.5, color: C.text, fontWeight: 500, lineHeight: 1.45 }}>{arg.claim}</div>
                        <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, color: statusColor, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', marginTop: 3 }}>
                          {arg.supported === true ? `Supported · ${arg.evidence.length} sources` : arg.supported === 'partial' ? 'Partially supported · gap flagged' : 'Not supported in record'}
                        </div>
                      </div>
                      <Icon path={isExpanded ? icons.ChevronDown : icons.ChevronRight} size={14} color={C.subtle} />
                    </div>
                    {isExpanded && (
                      <div style={{ padding: '0 0 12px 18px' }}>
                        {arg.evidence.length > 0 && (
                          <div style={{ marginBottom: 8 }}>
                            <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 9, fontWeight: 600, color: C.subtle, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 4 }}>Evidence</div>
                            {arg.evidence.map((e, j) => (
                              <div key={j} style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11.5, color: C.text, padding: '3px 0' }}>· {e}</div>
                            ))}
                          </div>
                        )}
                        {arg.gap && <Insight tone="warn"><strong>Gap.</strong> {arg.gap}</Insight>}
                      </div>
                    )}
                  </div>
                );
              })}
            </Panel>
          </div>

          <div style={{ gridColumn: 'span 5' }}>
            <Panel title="Rhetorical technique" subtitle="The craft elements in your delivery" iconKey="Sparkles">
              {RHETORICAL.map((d, i) => {
                const color = d.quality === 'strong' ? C.good : d.quality === 'mixed' ? C.warn : C.bad;
                return (
                  <div key={i} style={{ padding: '9px 0', borderBottom: i < RHETORICAL.length - 1 ? `1px solid ${C.border}` : 'none' }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 4 }}>
                      <span style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 600, fontSize: 12, color: C.text }}>{d.type}</span>
                      <span style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 13, color: color }}>{d.count}×</span>
                    </div>
                    <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11.5, color: C.subtle, lineHeight: 1.45 }}>{d.insight}</div>
                  </div>
                );
              })}
            </Panel>
          </div>

          <div style={{ gridColumn: 'span 7' }}>
            <Panel title="Emotional arc" subtitle="How the story moves the jury, moment by moment" iconKey="TrendingUp">
              <div style={{ position: 'relative', height: 130, marginBottom: 16 }}>
                <svg width="100%" height="130" viewBox="0 0 600 130" preserveAspectRatio="none">
                  <line x1="0" y1="65" x2="600" y2="65" stroke={C.border} strokeDasharray="3,3" />
                  {BEATS.map((b, i) => {
                    const bTime = parseInt(b.time.split(':')[0]) * 60 + parseInt(b.time.split(':')[1]);
                    const x = (bTime / CASE.duration) * 600;
                    const y = 65 - (b.valence * 1.2);
                    const size = b.intensity / 8;
                    return (
                      <g key={i}>
                        <line x1={x} y1="65" x2={x} y2={y} stroke={b.valence < 0 ? C.bad : C.good} strokeWidth="1.5" opacity="0.4" />
                        <circle cx={x} cy={y} r={size} fill={b.valence < 0 ? C.bad : C.good} opacity="0.7" />
                        <text x={x} y={y < 65 ? y - 8 : y + 14} textAnchor="middle" fontFamily="Poppins, sans-serif" fontSize="8" fontWeight="600" fill={C.subtle}>{b.time}</text>
                      </g>
                    );
                  })}
                  <text x="4" y="14" fontFamily="Poppins, sans-serif" fontSize="8" fontWeight="600" fill={C.subtle} letterSpacing="0.06em">POSITIVE</text>
                  <text x="4" y="126" fontFamily="Poppins, sans-serif" fontSize="8" fontWeight="600" fill={C.subtle} letterSpacing="0.06em">NEGATIVE</text>
                </svg>
              </div>
              {BEATS.map((b, i) => (
                <div key={i} style={{ padding: '7px 0', borderBottom: i < BEATS.length - 1 ? `1px solid ${C.border}` : 'none', display: 'flex', gap: 10 }}>
                  <span style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 11, color: C.primary, minWidth: 36 }}>{b.time}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 600, fontSize: 12, color: C.text }}>{b.beat}</div>
                    <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, color: C.subtle, marginTop: 2 }}>{b.delivery}</div>
                  </div>
                </div>
              ))}
            </Panel>
          </div>

          <div style={{ gridColumn: 'span 5' }}>
            <Panel title="Language & voice" subtitle="Patterns in how you speak" iconKey="MessageSquare">
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 14 }}>
                <Stat value={`${Math.round(LANGUAGE.activeVoice * 100)}%`} label="Active voice" sublabel="target: >75%" />
                <Stat value={LANGUAGE.avgSentence} label="Avg sentence length" sublabel="words — good range" />
                <Stat value={`Grade ${LANGUAGE.readability}`} label="Readability" sublabel="accessible to jury" />
                <Stat value={`${(LANGUAGE.jargon * 100).toFixed(1)}%`} label="Legal jargon" sublabel="low — keep low" />
                <Stat value={`${(LANGUAGE.filler * 100).toFixed(1)}%`} label="Filler words" sublabel="um, uh, like" />
                <Stat value={`${Math.round(LANGUAGE.strongVerbs * 100)}%`} label="Strong verbs" sublabel="chose, violated, knew" />
              </div>
              <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, color: C.subtle, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>Passive voice drifts</div>
              {LANGUAGE.passivePassages.map((p, i) => (
                <div key={i} style={{ padding: 10, background: C.warnBg, borderLeft: `3px solid ${C.warn}`, borderRadius: 4, marginBottom: 6 }}>
                  <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 11, fontWeight: 700, color: C.warn, marginBottom: 3 }}>{p.time}</div>
                  <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11.5, color: C.text, fontStyle: 'italic', marginBottom: 4 }}>"{p.text}"</div>
                  <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11, color: '#713F12', lineHeight: 1.5 }}>{p.note}</div>
                </div>
              ))}
            </Panel>
          </div>

          <div style={{ gridColumn: 'span 12' }}>
            <Panel title="Delivery" subtitle="Observable patterns — not guesses about what you were feeling" iconKey="Mic">
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 12 }}>
                {Object.entries(DELIVERY).map(([key, m]) => {
                  const label = key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
                  const color = m.score >= 8 ? C.good : m.score >= 6 ? C.secondary : C.warn;
                  return (
                    <div key={key} style={{ padding: 12, background: C.gray, borderRadius: 8, display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center' }}>
                      <RingMeter value={m.score} label={label} size={72} color={color} />
                      <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 10.5, color: C.subtle, marginTop: 8, lineHeight: 1.4 }}>{m.insight}</div>
                    </div>
                  );
                })}
              </div>
            </Panel>
          </div>

          <div style={{ gridColumn: 'span 12' }}>
            <Panel title="How to read these numbers" iconKey="Info">
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16, fontFamily: 'Noto Sans, sans-serif', fontSize: 12, color: C.text, lineHeight: 1.55 }}>
                <div>
                  <strong style={{ fontFamily: 'Poppins, sans-serif', color: C.primary }}>What is measured.</strong> Words, pauses, repetition, voice characteristics, gaze direction, gesture frequency, sentence structure, and claims traced to the evidence in your uploaded case file.
                </div>
                <div>
                  <strong style={{ fontFamily: 'Poppins, sans-serif', color: C.primary }}>What is predicted.</strong> Jury attention is modeled from patterns in closings with known mock-jury outcomes. Objection risk flags phrasing that historically draws sustained objections. These are predictions, not certainties.
                </div>
                <div>
                  <strong style={{ fontFamily: 'Poppins, sans-serif', color: C.primary }}>What is not claimed.</strong> We do not infer your mental state, the jury's verdict, or a witness's truthfulness from video. Those claims are not reliably supported by research. We surface what is observable and let you interpret it.
                </div>
              </div>
            </Panel>
          </div>

        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <div style={{ background: 'white', border: `1px solid ${C.border}`, borderRadius: 10, overflow: 'hidden', position: 'sticky', top: 78 }}>
            <div style={{ aspectRatio: '16/9', background: `linear-gradient(135deg, ${C.primary} 0%, ${C.secondary} 100%)`, position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ position: 'absolute', inset: 0, background: 'radial-gradient(circle at 30% 40%, rgba(255,255,255,0.1) 0%, transparent 60%)' }} />
              <div style={{ width: 64, height: 64, borderRadius: '50%', background: 'rgba(255,255,255,0.2)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', zIndex: 1 }} onClick={() => setIsPlaying(!isPlaying)}>
                <Icon path={isPlaying ? icons.Pause : icons.Play} size={26} color="white" />
              </div>
              <div style={{ position: 'absolute', bottom: 10, left: 12, color: 'white', fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, letterSpacing: '0.1em', textTransform: 'uppercase', opacity: 0.75 }}>Mock Closing · {fmt(CASE.duration)}</div>
            </div>
            <div style={{ padding: 10, background: C.dark }}>
              <div style={{ display: 'flex', height: 5, borderRadius: 3, overflow: 'hidden', marginBottom: 8 }}>
                {SEGMENTS.map(seg => {
                  const width = ((seg.end - seg.start) / CASE.duration) * 100;
                  const isActive = currentTime >= seg.start && currentTime < seg.end;
                  return <div key={seg.id} onClick={() => setCurrentTime(seg.start)} style={{ width: `${width}%`, background: seg.color, opacity: isActive ? 1 : 0.5, cursor: 'pointer' }} title={seg.label} />;
                })}
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', fontFamily: 'Poppins, sans-serif', fontSize: 10, color: 'white' }}>
                <span>{fmt(currentTime)}</span>
                <span style={{ opacity: 0.5 }}>{fmt(CASE.duration)}</span>
              </div>
            </div>
            <div style={{ padding: 14 }}>
              <div style={{ fontFamily: 'Poppins, sans-serif', fontSize: 10, fontWeight: 600, color: C.subtle, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 6 }}>Current Segment</div>
              <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 15, color: C.text }}>
                {SEGMENTS.find(s => currentTime >= s.start && currentTime < s.end)?.label || 'Opening Hook'}
              </div>
              <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11.5, color: C.subtle, marginTop: 6, lineHeight: 1.5 }}>
                This segment is where your liability story peaks. Strong rule-evidence connection throughout. Watch for the jargon drift at 03:47.
              </div>
            </div>
          </div>

          <Panel title="Top 3 fixes, ranked" subtitle="By expected lift on jury reception" iconKey="Lightbulb">
            {[
              { num: 1, title: 'Rewrite the Golden Rule passage at 11:22', effort: 'Low', impact: 'High', note: 'Objection risk drops to zero. Emotional weight preserved. Single-sentence fix.' },
              { num: 2, title: 'Triple your rebuttal time on individual driver error', effort: 'Medium', impact: 'High', note: 'Defense will spend 8 minutes here. You spend 41 seconds. This is where verdicts get lost.' },
              { num: 3, title: 'Anchor the $8.4M non-economic with a per-diem', effort: 'Medium', impact: 'Medium', note: 'Lump-sum numbers feel arbitrary. Per-diem makes the math undeniable.' },
            ].map((fix, i) => (
              <div key={i} style={{ padding: '10px 0', borderBottom: i < 2 ? `1px solid ${C.border}` : 'none' }}>
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                  <div style={{ width: 22, height: 22, borderRadius: '50%', background: C.primary, color: 'white', display: 'flex', alignItems: 'center', justifyContent: 'center', fontFamily: 'Poppins, sans-serif', fontWeight: 700, fontSize: 11, flexShrink: 0 }}>{fix.num}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontFamily: 'Poppins, sans-serif', fontWeight: 600, fontSize: 12.5, color: C.text, lineHeight: 1.35 }}>{fix.title}</div>
                    <div style={{ display: 'flex', gap: 10, marginTop: 4, fontFamily: 'Poppins, sans-serif', fontSize: 10, color: C.subtle }}>
                      <span>Effort: <strong style={{ color: C.text }}>{fix.effort}</strong></span>
                      <span>Impact: <strong style={{ color: fix.impact === 'High' ? C.good : C.warn }}>{fix.impact}</strong></span>
                    </div>
                    <div style={{ fontFamily: 'Noto Sans, sans-serif', fontSize: 11.5, color: C.subtle, marginTop: 5, lineHeight: 1.5 }}>{fix.note}</div>
                  </div>
                </div>
              </div>
            ))}
          </Panel>

          <Panel title="Case context" iconKey="FileText">
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, fontFamily: 'Noto Sans, sans-serif', fontSize: 12 }}>
              <div><span style={{ color: C.subtle }}>Attorney: </span><strong style={{ color: C.text }}>{CASE.attorney}</strong></div>
              <div><span style={{ color: C.subtle }}>Jurisdiction: </span><strong style={{ color: C.text }}>{CASE.jurisdiction}</strong></div>
              <div><span style={{ color: C.subtle }}>Words: </span><strong style={{ color: C.text }}>{CASE.wordCount.toLocaleString()}</strong> <span style={{ color: C.subtle, fontSize: 11 }}>· {CASE.avgWPM} WPM avg</span></div>
              <div><span style={{ color: C.subtle }}>Exhibits referenced: </span><strong style={{ color: C.text }}>14</strong></div>
              <div><span style={{ color: C.subtle }}>Depositions cited: </span><strong style={{ color: C.text }}>6</strong></div>
              <div><span style={{ color: C.subtle }}>Case record coverage: </span><strong style={{ color: C.good }}>92%</strong></div>
            </div>
          </Panel>
        </div>

      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Dashboard />);
</script>
</body>
</html>
